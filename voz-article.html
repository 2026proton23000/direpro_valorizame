<!DOCTYPE html>
<html lang="fr">
<head>
    <base href="/direpro_valorizame/">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Actualité · La Voz de Tacna</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Plus+Jakarta+Sans:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .article-container {
            max-width: 1000px;
            margin: 4rem auto;
            padding: 2rem;
            background: white;
            border-radius: 30px;
            box-shadow: 0 20px 40px -10px rgba(197,40,40,0.2);
        }
        .article-header {
            margin-bottom: 2rem;
        }
        .article-header h1 {
            font-size: 2.8rem;
            color: var(--rojo);
            margin-bottom: 1rem;
        }
        .article-meta {
            display: flex;
            gap: 2rem;
            color: #888;
            margin-bottom: 2rem;
        }
        .article-content {
            font-size: 1.2rem;
            line-height: 1.8;
            color: #2a2a3a;
            margin-bottom: 3rem;
        }
        /* Galerie */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1rem;
            margin: 2rem 0;
        }
        .gallery-item {
            cursor: pointer;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }
        .gallery-item:hover {
            transform: scale(1.02);
        }
        .gallery-item img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            display: block;
        }
        /* Modal pour zoom */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.9);
            text-align: center;
        }
        .modal-content {
            margin: auto;
            display: block;
            max-width: 90%;
            max-height: 80%;
            position: relative;
            top: 50%;
            transform: translateY(-50%);
        }
        .close {
            position: absolute;
            top: 20px;
            right: 35px;
            color: #fff;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
        }
        .back-link {
            display: inline-block;
            margin-top: 2rem;
            color: var(--rojo);
            font-weight: 600;
        }
    </style>
</head>
<body>
    <header>
        <div class="container header-flex">
            <div class="logo">DIREPRO<span> · Tacna</span></div>
            <nav>
                <a href="index.html" data-i18n="nav.accueil">Accueil</a>
                <a href="a-propos.html" data-i18n="nav.projet">Le projet</a>
                <a href="solutions.html" data-i18n="nav.solutions">Solutions</a>
                <a href="voz-tacna.html" data-i18n="nav.voz">La Voz</a>
                <a href="carte.html" data-i18n="nav.carte">Carte</a>
                <a href="contact.html" data-i18n="nav.contact">Contact</a>
            </nav>
            <div class="lang-switcher">
                <a href="?lang=es" class="lang-option" data-lang="es">🇪🇸 ES</a>
                <a href="?lang=fr" class="lang-option" data-lang="fr">🇫🇷 FR</a>
                <a href="?lang=en" class="lang-option" data-lang="en">🇺🇸 EN</a>
            </div>
        </div>
    </header>

    <main>
        <div class="container">
            <div id="article-container" class="article-container">
                <!-- Contenu chargé dynamiquement -->
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>© 2025 DIREPRO Tacna · Gobierno Regional de Tacna · Projet Valorizame</p>
            <p><a href="#" data-i18n="footer.mentions">Mentions légales</a> · <a href="#" data-i18n="footer.donnees">Accès aux données</a></p>
        </div>
    </footer>

    <!-- Modal pour zoom -->
    <div id="imageModal" class="modal">
        <span class="close">&times;</span>
        <img class="modal-content" id="modalImage">
    </div>

    <script src="js/i18n.js"></script>
    <script src="js/voz-article.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
